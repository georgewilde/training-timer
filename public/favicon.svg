<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#10b981"/>
  <!-- Dog face -->
  <g fill="#ffffff" transform="translate(256,270)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="100" ry="90"/>
    <!-- Left ear (floppy) -->
    <ellipse cx="-85" cy="-60" rx="40" ry="65" transform="rotate(-15,-85,-60)"/>
    <!-- Right ear (floppy) -->
    <ellipse cx="85" cy="-60" rx="40" ry="65" transform="rotate(15,85,-60)"/>
    <!-- Left inner ear -->
    <ellipse cx="-85" cy="-55" rx="22" ry="40" transform="rotate(-15,-85,-55)" fill="#10b981" opacity="0.3"/>
    <!-- Right inner ear -->
    <ellipse cx="85" cy="-55" rx="22" ry="40" transform="rotate(15,85,-55)" fill="#10b981" opacity="0.3"/>
    <!-- Left eye -->
    <ellipse cx="-35" cy="-15" rx="14" ry="16" fill="#1e293b"/>
    <!-- Left eye shine -->
    <circle cx="-30" cy="-20" r="5" fill="#ffffff"/>
    <!-- Right eye -->
    <ellipse cx="35" cy="-15" rx="14" ry="16" fill="#1e293b"/>
    <!-- Right eye shine -->
    <circle cx="40" cy="-20" r="5" fill="#ffffff"/>
    <!-- Snout -->
    <ellipse cx="0" cy="25" rx="45" ry="35" fill="#f0fdf4"/>
    <!-- Nose -->
    <ellipse cx="0" cy="12" rx="18" ry="13" fill="#1e293b"/>
    <!-- Nose shine -->
    <ellipse cx="-5" cy="8" rx="6" ry="4" fill="#374151" opacity="0.5"/>
    <!-- Mouth -->
    <path d="M-12,30 Q0,42 12,30" fill="none" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
    <!-- Tongue -->
    <ellipse cx="0" cy="42" rx="10" ry="14" fill="#fb7185"/>
  </g>
</svg>
